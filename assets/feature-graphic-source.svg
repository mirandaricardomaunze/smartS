<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="60%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="blur-bg">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="shadow-card">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1e1b4b" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#818cf8" flood-opacity="0.5"/>
    </filter>
    <clipPath id="rounded">
      <rect width="1024" height="500" rx="0"/>
    </clipPath>
  </defs>

  <!-- Fundo principal -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Círculos decorativos de fundo -->
  <circle cx="900" cy="80"  r="200" fill="#818cf8" opacity="0.12" filter="url(#blur-bg)"/>
  <circle cx="100" cy="420" r="180" fill="#a78bfa" opacity="0.1"  filter="url(#blur-bg)"/>
  <circle cx="512" cy="250" r="300" fill="#6366f1" opacity="0.08" filter="url(#blur-bg)"/>

  <!-- ==================== LADO ESQUERDO — Marca ==================== -->

  <!-- Ícone da app (mini versão) -->
  <rect x="60" y="140" width="72" height="72" rx="18" fill="white" opacity="0.15"/>
  <rect x="60" y="140" width="72" height="72" rx="18" fill="white" opacity="0.08"/>
  <!-- S dentro do ícone -->
  <text x="96" y="198" text-anchor="middle" font-family="'Arial Black', sans-serif" font-weight="900" font-size="44" fill="white">S</text>

  <!-- Nome SmartS -->
  <text x="148" y="180" font-family="'Arial Black', sans-serif" font-weight="900" font-size="52" fill="white" letter-spacing="-1">SmartS</text>

  <!-- Tagline -->
  <text x="148" y="208" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.75" letter-spacing="0.5">Gestão Inteligente do Teu Negócio</text>

  <!-- Separador -->
  <rect x="60" y="240" width="360" height="2" rx="1" fill="white" opacity="0.15"/>

  <!-- Features lista -->
  <!-- Feature 1 -->
  <circle cx="84"  cy="278" r="6" fill="#34d399"/>
  <text   x="100" y="283" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.9">Inventário &amp; Stock em tempo real</text>

  <!-- Feature 2 -->
  <circle cx="84"  cy="310" r="6" fill="#34d399"/>
  <text   x="100" y="315" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.9">Ponto de Venda (POS) integrado</text>

  <!-- Feature 3 -->
  <circle cx="84"  cy="342" r="6" fill="#34d399"/>
  <text   x="100" y="347" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.9">Gestão de Recursos Humanos</text>

  <!-- Feature 4 -->
  <circle cx="84"  cy="374" r="6" fill="#34d399"/>
  <text   x="100" y="379" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.9">Relatórios &amp; Análises Financeiras</text>

  <!-- Badge planos -->
  <rect x="60" y="415" width="130" height="36" rx="18" fill="white" opacity="0.15"/>
  <text x="125" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="white">Planos a partir de 200 MT</text>

  <!-- ==================== LADO DIREITO — UI Mockup ==================== -->

  <!-- Telemóvel (outline) -->
  <rect x="570" y="30" width="240" height="440" rx="32" fill="white" opacity="0.06" filter="url(#shadow-card)"/>
  <rect x="570" y="30" width="240" height="440" rx="32" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Ecrã interior -->
  <rect x="582" y="55" width="216" height="390" rx="20" fill="#0f172a" opacity="0.6"/>

  <!-- Barra de status mockup -->
  <rect x="582" y="55" width="216" height="44" rx="20" fill="url(#card2)"/>
  <text x="694" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.8" font-weight="700">Dashboard</text>

  <!-- Card de receita mockup -->
  <rect x="598" y="112" width="184" height="64" rx="14" fill="url(#card)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="614" y="132" font-family="Arial, sans-serif" font-size="10" fill="white" opacity="0.55">Receita Total</text>
  <text x="614" y="155" font-family="'Arial Black', sans-serif" font-weight="900" font-size="22" fill="white">125.400 MT</text>
  <text x="730" y="155" font-family="Arial, sans-serif" font-size="10" fill="#34d399">↑ 12%</text>

  <!-- Mini gráfico de barras mockup -->
  <rect x="598" y="188" width="184" height="90" rx="14" fill="url(#card)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="614" y="207" font-family="Arial, sans-serif" font-size="10" fill="white" opacity="0.55">Vendas esta semana</text>
  <!-- Barras -->
  <rect x="614" y="238" width="16" height="28" rx="4" fill="#818cf8" opacity="0.5"/>
  <rect x="636" y="228" width="16" height="38" rx="4" fill="#818cf8" opacity="0.6"/>
  <rect x="658" y="218" width="16" height="48" rx="4" fill="#818cf8" opacity="0.8"/>
  <rect x="680" y="234" width="16" height="32" rx="4" fill="#818cf8" opacity="0.6"/>
  <rect x="702" y="222" width="16" height="44" rx="4" fill="#6366f1"/>
  <rect x="724" y="230" width="16" height="36" rx="4" fill="#818cf8" opacity="0.6"/>
  <rect x="746" y="212" width="16" height="54" rx="4" fill="#34d399"/>

  <!-- Cards de stats mockup -->
  <rect x="598" y="290" width="86" height="52" rx="12" fill="url(#card)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="614" y="308" font-family="Arial, sans-serif" font-size="9" fill="white" opacity="0.55">Produtos</text>
  <text x="614" y="330" font-family="'Arial Black', sans-serif" font-weight="900" font-size="18" fill="white">248</text>

  <rect x="696" y="290" width="86" height="52" rx="12" fill="url(#card)" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="712" y="308" font-family="Arial, sans-serif" font-size="9" fill="white" opacity="0.55">Clientes</text>
  <text x="712" y="330" font-family="'Arial Black', sans-serif" font-weight="900" font-size="18" fill="white">87</text>

  <!-- Bottom nav mockup -->
  <rect x="582" y="395" width="216" height="50" rx="0" fill="url(#card2)"/>
  <rect x="582" y="395" width="216" height="50" rx="0" fill="none"/>
  <!-- Nav dots -->
  <circle cx="630" cy="420" r="4" fill="white"/>
  <circle cx="660" cy="420" r="3" fill="white" opacity="0.4"/>
  <circle cx="690" cy="420" r="3" fill="white" opacity="0.4"/>
  <circle cx="720" cy="420" r="3" fill="white" opacity="0.4"/>
  <circle cx="750" cy="420" r="3" fill="white" opacity="0.4"/>

  <!-- Segundo telemóvel (parcial, atrás) -->
  <rect x="820" y="60" width="180" height="380" rx="28" fill="white" opacity="0.04" filter="url(#shadow-card)"/>
  <rect x="820" y="60" width="180" height="380" rx="28" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
  <rect x="832" y="82" width="156" height="336" rx="16" fill="#1e293b" opacity="0.4"/>
  <!-- POS mockup interior -->
  <text x="910" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" opacity="0.5">Ponto de Venda</text>
  <rect x="848" y="142" width="124" height="40" rx="10" fill="white" opacity="0.08"/>
  <text x="910" y="168" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="16" fill="white" opacity="0.7">85.000 MT</text>
  <!-- Itens lista mockup -->
  <rect x="848" y="194" width="124" height="22" rx="6" fill="white" opacity="0.06"/>
  <rect x="848" y="222" width="124" height="22" rx="6" fill="white" opacity="0.06"/>
  <rect x="848" y="250" width="124" height="22" rx="6" fill="white" opacity="0.06"/>
  <!-- Botão pagar -->
  <rect x="848" y="290" width="124" height="36" rx="12" fill="#6366f1" opacity="0.8"/>
  <text x="910" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="white">Cobrar</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4f46e5" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Brilho superior -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- Ícone central: gráfico de barras + relâmpago (negócio inteligente) -->
  <!-- Barras do gráfico -->
  <rect x="108" y="280" width="56" height="120" rx="12" fill="white" opacity="0.25"/>
  <rect x="188" y="220" width="56" height="180" rx="12" fill="white" opacity="0.4"/>
  <rect x="268" y="170" width="56" height="230" rx="12" fill="white" opacity="0.6"/>
  <rect x="348" y="240" width="56" height="160" rx="12" fill="white" opacity="0.4"/>

  <!-- Linha de tendência -->
  <polyline
    points="136,290 216,235 296,185 376,255"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.9"
  />

  <!-- Pontos na linha -->
  <circle cx="136" cy="290" r="10" fill="white"/>
  <circle cx="216" cy="235" r="10" fill="white"/>
  <circle cx="296" cy="185" r="10" fill="white"/>
  <circle cx="376" cy="255" r="10" fill="white"/>

  <!-- Letra S em cima (marca) -->
  <text
    x="256"
    y="148"
    text-anchor="middle"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="96"
    fill="white"
    filter="url(#shadow)"
  >S</text>

  <!-- Linha separadora subtil -->
  <line x1="108" y1="160" x2="404" y2="160" stroke="white" stroke-width="2" opacity="0.2"/>
</svg>
